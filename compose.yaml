services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yoga_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app  # for dev
      - /app/.venv
    depends_on:
      - redis

  redis:
    image: redis:7-alpine  
    container_name: yoga_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data: